<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF-DETR 视频目标检测</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>
    <header>
        <div class="header-left">
            <h1 data-text="RF-DETR">RF-DETR</h1>
            <div class="header-subtitle">
                <span class="version-tag">V4.0</span>
                <span>视频目标检测 · 左右对比 · 本地推理</span>
            </div>
        </div>
        <div class="header-right">
            <div class="status-online">
                <span class="dot"></span>
                <span id="status-label">等待上传</span>
            </div>
        </div>
    </header>

    <main>
        <!-- 上传区域 -->
        <div class="upload-section" id="upload-section">
            <div class="upload-area" id="upload-area">
                <span class="material-symbols-outlined upload-icon">cloud_upload</span>
                <h2>拖拽视频到这里</h2>
                <p>或点击选择视频文件</p>
                <p class="upload-hint">支持 MP4 / WebM / MOV 等常见格式</p>
                <input type="file" id="file-input" accept="video/*" hidden />
            </div>
        </div>

        <!-- 模型加载状态 -->
        <div class="loading-section" id="loading-section" style="display:none">
            <div class="spinner"></div>
            <div id="loading-text">加载模型中...</div>
            <div id="loading-sub">下载 RF-DETR Medium (fp32)</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- 双画面播放区 -->
        <div class="dual-view" id="dual-view" style="display:none">
            <div class="controls-bar">
                <div class="controls-left">
                    <button id="play-pause-btn" class="ctrl-btn" title="播放/暂停">
                        <span class="material-symbols-outlined" id="pp-icon">play_arrow</span>
                    </button>
                    <button id="stop-btn" class="ctrl-btn" title="停止">
                        <span class="material-symbols-outlined">stop</span>
                    </button>
                    <span class="time-display" id="time-display">00:00 / 00:00</span>
                </div>
                <div class="controls-center">
                    <label class="threshold-label">
                        <span class="material-symbols-outlined">tune</span>
                        置信度
                    </label>
                    <input type="range" id="threshold" min="0" max="1" step="0.01" value="0.5">
                    <span id="thresh-val">0.50</span>
                </div>
                <div class="controls-right">
                    <div class="fps-box">
                        <span id="fps-counter">0.0</span>
                        <span class="fps-label">FPS</span>
                    </div>
                    <button id="new-video-btn" class="ctrl-btn" title="更换视频">
                        <span class="material-symbols-outlined">folder_open</span>
                    </button>
                </div>
            </div>

            <div class="video-panels">
                <div class="panel original-panel">
                    <div class="panel-label">
                        <span class="material-symbols-outlined">videocam</span>
                        原始视频
                    </div>
                    <div class="video-wrapper">
                        <video id="original-video" muted></video>
                    </div>
                </div>
                <div class="panel-divider"></div>
                <div class="panel detection-panel">
                    <div class="panel-label">
                        <span class="material-symbols-outlined">radar</span>
                        检测结果
                        <span class="detect-count" id="detect-count">0 个目标</span>
                    </div>
                    <div class="video-wrapper">
                        <canvas id="detection-canvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="seek-bar-container">
                <input type="range" id="seek-bar" min="0" max="100" step="0.1" value="0">
            </div>

            <!-- 检测信息面板 -->
            <div class="info-bar">
                <div class="info-section">
                    <div class="info-card">
                        <div class="info-title">检测总数</div>
                        <div class="info-value" id="total-count">0</div>
                    </div>
                    <div class="info-card">
                        <div class="info-title">当前帧目标</div>
                        <div class="info-value" id="frame-count">0</div>
                    </div>
                    <div class="info-card">
                        <div class="info-title">平均置信度</div>
                        <div class="info-value" id="avg-conf">0%</div>
                    </div>
                    <div class="info-card">
                        <div class="info-title">处理帧数</div>
                        <div class="info-value" id="processed-frames">0</div>
                    </div>
                </div>
                <div class="detection-list-section">
                    <div class="list-title">当前帧检测结果</div>
                    <div id="detections-container"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        Powered by
        <a href="https://github.com/huggingface/transformers.js" target="_blank">Transformers.js</a>
        &middot; RF-DETR Medium (ONNX) &middot; WebGPU
    </footer>

    <script type="module" src="/main.js"></script>
</body>
</html>
